modLoader = "javafml"
loaderVersion = "[1,)"
license = "MIT"
issueTrackerURL = "https://github.com/osad-sakana/utilitiesforprogrammers/issues"

[[mods]]
modId = "utilitiesforprogrammers"
version = "1.0.0"
displayName = "UtilitiesForProgrammers"
authors = "osad-sakana"
description = '''
Client-side utilities to support learning programming inside Minecraft.

Features:
  - HUD with absolute coordinates, facing direction, and a target-block inspector
    (block id + block-state properties).
  - Client-side block-update highlighting that colors blocks by placement order
    (newest = red, fading to blue) and fades out over time.
  - A relative-coordinate ground grid projected around the player.
  - Window controls: keep rendering while unfocused, an always-on-top toggle,
    and a freeze toggle to hold the HUD/highlights still for copying.

This mod is client-side only and does not need to be installed on the server.
'''

# Mixins are used to detect block updates received from the server, which works
# even when the server has no mods installed.
[[mixins]]
config = "utilitiesforprogrammers.mixins.json"

[[dependencies.utilitiesforprogrammers]]
modId = "neoforge"
type = "required"
versionRange = "[21.10.0,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.utilitiesforprogrammers]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.10,1.22)"
ordering = "NONE"
side = "CLIENT"
